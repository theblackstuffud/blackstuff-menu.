<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>The Black Stuff - Digital Menu</title>

<style>
:root{
  --gold:#c7a24b;
  --cream:#f4efe3;
  --dark:#050505;
  --green:#0b3d27;
  --muted:#aaa091;
}

*{box-sizing:border-box}

body{
  margin:0;
  min-height:100vh;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;
  background:
    radial-gradient(circle at top,#143b29 0%,#050505 48%),
    linear-gradient(180deg,#101010,#050505);
  color:var(--cream);
  text-align:center;
}

.wrap{
  max-width:440px;
  margin:0 auto;
  padding:34px 20px 28px;
}

.logo-box{
  background:var(--cream);
  border-radius:22px;
  padding:18px;
  margin:0 auto 22px;
  box-shadow:0 18px 50px rgba(0,0,0,.55);
  border:1px solid rgba(199,162,75,.5);
}

.logo-box img{
  width:100%;
  display:block;
}

h1{
  margin:0;
  color:var(--gold);
  font-size:22px;
  letter-spacing:2px;
  text-transform:uppercase;
}

.subtitle{
  margin:10px 0 24px;
  color:var(--muted);
  font-size:15px;
}

.card{
  background:rgba(255,255,255,.06);
  border:1px solid rgba(199,162,75,.35);
  border-radius:24px;
  padding:16px;
  backdrop-filter:blur(8px);
  box-shadow:0 18px 45px rgba(0,0,0,.45);
}

.btn{
  display:flex;
  justify-content:space-between;
  align-items:center;
  text-decoration:none;
  color:#111;
  background:var(--cream);
  border-radius:16px;
  padding:17px 18px;
  margin:12px 0;
  font-size:18px;
  font-weight:800;
}

.btn span{
  font-size:24px;
}

.social{
  margin-top:28px;
  color:var(--muted);
  font-size:14px;
}

.social a{
  display:inline-block;
  color:var(--gold);
  text-decoration:none;
  font-weight:800;
  margin:12px 10px 0;
}

.wifi{
  margin-top:22px;
  padding:16px;
  border-radius:18px;
  background:rgba(255,255,255,.07);
  border:1px solid rgba(255,255,255,.1);
  line-height:1.6;
  font-size:15px;
}

.wifi strong{
  color:var(--gold);
}

.footer{
  margin-top:22px;
  font-size:12px;
  color:#81796d;
}
</style>
</head>

<body>

<div class="wrap">

  <div class="logo-box">
    <img src="logo.jpg" alt="The Black Stuff logo">
  </div>

  <h1>Digital Menu</h1>
  <div class="subtitle">Choose your language</div>

  <div class="card">
    <a class="btn" href="menu-it.pdf">Italiano <span>🇮🇹</span></a>
    <a class="btn" href="menu-en.pdf">English <span>🇬🇧</span></a>
    <a class="btn" href="menu-de.pdf">Deutsch <span>🇩🇪</span></a>
    <a class="btn" href="menu-es.pdf">Español <span>🇪🇸</span></a>
  </div>

  <div class="social">
    Follow us<br>
    <a href="https://www.instagram.com/theblackstuffud?igsh=MW9tZWViMXBvdDFxNA%3D%3D&utm_source=qr" target="_blank">Instagram</a>
    <a href="https://www.facebook.com/TheBlackStuffUdine?" target="_blank">Facebook</a>
  </div>

  <div class="wifi">
    📶 Wi-Fi<br>
    Rete: <strong>TheBlackStuff</strong><br>
    Password: <strong>theblackstuff</strong>
  </div>

  <div class="footer">
    The Black Stuff Irish Pub · Udine
  </div>

</div>

</body>
</html>
